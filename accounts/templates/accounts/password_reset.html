{% extends 'base.html' %}
{% block title %}Recuperar senha — ACADEME.IA{% endblock %}
{% block body %}
<main class="auth-page">
  <section class="auth-card glass compact">
    <div class="auth-form full-width">
      <a class="brand" href="{% url 'core:home' %}"><span class="brand-mark">AI</span> ACADEME.IA</a>
      <h2>Recuperar senha</h2>
      <p>Informe seu e-mail. Configure o backend de e-mail no Django para envio real.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary full" type="submit">Enviar instruções</button>
      </form>
    </div>
  </section>
</main>
{% endblock %}
