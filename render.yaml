services:
  - type: web
    name: academeia
    runtime: python
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_TRANSCRIPTION_MODEL
        value: whisper-large-v3-turbo
      - key: TRANSCRIPTION_ALWAYS_CHUNK
        value: true
      - key: TRANSCRIPTION_LANGUAGE
        value: pt

      - key: WEB_CONCURRENCY
        value: 1
      - key: MAX_UPLOAD_MB
        value: 200
      - key: TRANSCRIPTION_CHUNK_SECONDS
        value: 45
      - key: TRANSCRIPTION_OVERLAP_SECONDS
        value: 5
      - key: TRANSCRIPTION_RETRY_ATTEMPTS
        value: 6
      - key: TRANSCRIPTION_PROMPT
        value: Aula de Direito em português do Brasil. Preserve a fala do professor e atenção a termos jurídicos.
      - key: SUMMARY_DIRECT_CHARS
        value: 9000
      - key: SUMMARY_SOURCE_MAX_CHARS
        value: 9000
      - key: SUMMARY_CHUNK_CHARS
        value: 6500
      - key: SUMMARY_MAX_OUTPUT_TOKENS
        value: 2200
